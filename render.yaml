services:
  - type: web
    name: github-repo-rag
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: GROQ_API_KEY
        sync: false
    disk:
      name: chroma-db
      mountPath: /chroma_db
      sizeGB: 1
